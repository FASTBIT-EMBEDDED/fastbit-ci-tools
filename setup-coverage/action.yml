name: Setup Coverage Tools
description: Install lcov and genhtml for test coverage reporting

runs:
  using: composite
  steps:
    - name: Install lcov
      shell: bash
      run: sudo apt-get update -qq && sudo apt-get install -y -qq lcov

    - name: Verify tools
      shell: bash
      run: |
        echo "lcov: $(lcov --version)"
        echo "genhtml: $(genhtml --version)"
